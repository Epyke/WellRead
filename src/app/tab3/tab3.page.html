<ion-header [translucent]="true">
  <ion-toolbar>
    <custom-toolbar></custom-toolbar>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-list>
    @for (book of getBooks(); track book.id) {
      <ion-item button (click)="openBook(book.id)">
        <ion-thumbnail slot="start" class="book-cover">
          <img [src]="book.cover" />
        </ion-thumbnail>
        <ion-label>
          <h2>{{ book.title }}</h2>
          <p>{{ book.author }}</p>
          @if (book.userInteraction.score !== '') {
            <p>{{ book.userInteraction.score }}/5</p>
          }
        </ion-label>
        <ion-button slot="end" fill="clear" shape="round" size="default">
          <ion-icon name="heart" slot="icon-only"></ion-icon>
        </ion-button>
      </ion-item>
    }
  </ion-list>
</ion-content>
